<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AWS Flask App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #f4f6f8; }
        h1 { color: #232f3e; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 8px; margin: 6px 0 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #ff9900; color: white; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
        button:hover { background: #e68a00; }
        .msg { background: #eaf3fb; padding: 10px 16px; border-radius: 6px; margin-bottom: 10px; }
        .msg span { font-weight: bold; color: #232f3e; }
    </style>
</head>
<body>
    <div class="card">
        <h1>☁️ My AWS Flask App</h1>
        <p>Deployed on Amazon EC2 — Cloud Computing Assignment</p>
    </div>
    <div class="card">
        <h2>Leave a Message</h2>
        <form action="/add" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <textarea name="message" placeholder="Your message..." rows="3" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>
    <div class="card">
        <h2>Messages</h2>
        {% if messages %}
            {% for msg in messages %}
            <div class="msg"><span>{{ msg[1] }}:</span> {{ msg[2] }}</div>
            {% endfor %}
        {% else %}
            <p style="color:#888">No messages yet. Be the first!</p>
        {% endif %}
    </div>
</body>
</html>
